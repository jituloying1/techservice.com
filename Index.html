<!DOCTYPE html>
<html>
<head>
<title>Alphabet Sound Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f8ff;
}

h1 {
  margin-top: 20px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 30px;
}

.letter {
  width: 70px;
  height: 70px;
  margin: 10px;
  background: #4CAF50;
  color: white;
  font-size: 30px;
  font-weight: bold;
  line-height: 70px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.letter:hover {
  background: #2e7d32;
  transform: scale(1.1);
}
</style>
</head>

<body>

<h1>🔤 Click Alphabet & Hear Sound</h1>

<div class="container" id="alphabetContainer"></div>

<script>
// Alphabet array
let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

// Shuffle letters (mixing)
letters.sort(() => Math.random() - 0.5);

// Create buttons
let container = document.getElementById("alphabetContainer");

letters.forEach(letter => {
  let div = document.createElement("div");
  div.className = "letter";
  div.innerText = letter;

  div.onclick = () => speakLetter(letter);

  container.appendChild(div);
});

// Speak function
function speakLetter(letter) {
  let speech = new SpeechSynthesisUtterance(letter);
  speech.rate = 0.8;
  speech.pitch = 1;
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
